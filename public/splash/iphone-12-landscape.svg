      <stop offset="0%" style="stop-color:#f6f7f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="844" height="390" fill="url(#bgGradientLandscape)"/>
  
  <!-- Logo -->
  <image href="/logo.png" x="376" y="149" width="92" height="92" preserveAspectRatio="xMidYMid meet"/>
  
  <!-- Logo Text -->
  <text x="422" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1f2937">
