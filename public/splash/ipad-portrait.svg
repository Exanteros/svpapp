    <linearGradient id="bgGradientPad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f6f7f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="820" height="1180" fill="url(#bgGradientPad)"/>
  
  <!-- Logo -->
  <image href="/logo.png" x="335" y="445" width="150" height="150" preserveAspectRatio="xMidYMid meet"/>
  
  <!-- Logo Text -->
  <text x="410" y="680" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#1f2937">
