  </text>
  
  <!-- Footer -->
  <text x="410" y="1050" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#9ca3af">
    Sportverein Puschendorf e.V.
