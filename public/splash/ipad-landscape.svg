      <stop offset="0%" style="stop-color:#f6f7f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1180" height="820" fill="url(#bgGradientPadLand)"/>
  
  <!-- Logo -->
  <image href="/logo.png" x="524" y="344" width="132" height="132" preserveAspectRatio="xMidYMid meet"/>
  
  <!-- Logo Text -->
  <text x="590" y="540" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" fill="#1f2937">
