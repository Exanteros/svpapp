<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#5e6d35" />
    <title>Offline - SV Puschendorf Turnier</title>
    <style>
      :root {
        color-scheme: light;
        --olive: #5e6d35;
        --olive-dark: #35401f;
        --paper: #f6f7f1;
        --border: #d9dec8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        padding: max(24px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
        background: var(--paper);
        color: #202315;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        min-height: calc(100svh - 48px);
        place-items: center;
      }

      section {
        width: min(100%, 520px);
        border: 1px solid var(--border);
        border-radius: 8px;
        background: white;
        padding: 24px;
        box-shadow: 0 12px 40px rgb(53 64 31 / 10%);
      }

      .mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: white;
        object-fit: contain;
      }

      h1 {
        margin: 18px 0 10px;
        font-size: 1.35rem;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #5e624d;
        line-height: 1.65;
      }

      a {
        display: inline-flex;
        margin-top: 20px;
        color: var(--olive-dark);
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <img class="mark" src="/logo.png" alt="SV Puschendorf" />
        <h1>Gerade offline</h1>
        <p>Die Turnier-App ist installiert. Sobald die Verbindung wieder da ist, werden Spielplan und Ergebnisse aktualisiert.</p>
        <a href="/">Startseite erneut versuchen</a>
      </section>
    </main>
  </body>
</html>
